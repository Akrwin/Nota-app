<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>Nota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:          #1a1a18;
  --muted:        #6b6b66;
  --hint:         #b0afa8;
  --surface:      #ffffff;
  --raised:       #f7f6f3;
  --sidebar-bg:   #f2f1ee;
  --border:       rgba(0,0,0,0.09);
  --border-md:    rgba(0,0,0,0.15);
  --accent:       #8B6F47;
  --accent-light: #F0E8DC;
  --accent-dim:   #c4a882;
  --danger:       #b83232;
  --titlebar-h:   38px;
  --sidebar-w:    220px;
  --folder-sidebar-w: 180px;
}

html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; color: var(--ink); background: var(--surface); user-select: none; }

/* ── Title bar ── */
.titlebar {
  height: var(--titlebar-h);
  background: var(--sidebar-bg);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  -webkit-app-region: drag;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}
.titlebar-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--muted);
  pointer-events: none;
}
.titlebar-btns {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  -webkit-app-region: no-drag;
}
.tb-btn {
  width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: transparent; transition: color 0.1s;
}
.tb-btn:hover { color: rgba(0,0,0,0.6); }
.tb-close  { background: #FF5F57; }
.tb-min    { background: #FEBC2E; }
.tb-max    { background: #28C840; }

/* ── Layout ── */
.layout {
  display: flex;
  height: calc(100vh - var(--titlebar-h));
}

/* ── Folder sidebar (workspaces) ── */
.folder-sidebar {
  width: var(--folder-sidebar-w);
  min-width: var(--folder-sidebar-w);
  background: var(--sidebar-bg);
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
}

.folder-sidebar-header {
  padding: 14px 12px 10px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.fs-label { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; color: var(--hint); text-transform: uppercase; }

.icon-btn {
  width: 24px; height: 24px; border-radius: 5px; border: none;
  background: transparent; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: background 0.12s, color 0.12s;
}
.icon-btn:hover { background: var(--border); color: var(--ink); }

.folder-list { flex: 1; overflow-y: auto; padding: 6px; }
.folder-list::-webkit-scrollbar { width: 3px; }
.folder-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.folder-item {
  padding: 7px 8px; border-radius: 6px; cursor: pointer;
  margin-bottom: 1px; border: 0.5px solid transparent;
  transition: background 0.1s;
  display: flex; align-items: center; gap: 6px;
}
.folder-item:hover { background: var(--raised); }
.folder-item.active { background: var(--surface); border-color: var(--border-md); }
.folder-item.active .fi-name { color: var(--accent); font-weight: 500; }
.fi-icon { font-size: 13px; flex-shrink: 0; }
.fi-name { font-size: 12px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fi-remove { margin-left: auto; opacity: 0; font-size: 12px; color: var(--hint); flex-shrink: 0; cursor: pointer; padding: 0 2px; }
.folder-item:hover .fi-remove { opacity: 1; }

.folder-sidebar-footer { padding: 10px 12px; border-top: 0.5px solid var(--border); }
.add-folder-btn {
  width: 100%; padding: 7px; border: 0.5px dashed var(--border-md); border-radius: 6px;
  background: transparent; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.add-folder-btn:hover { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-light); }

/* ── File sidebar ── */
.file-sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--raised);
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
}

.file-sidebar-header {
  padding: 14px 12px 10px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.fsh-title { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

.file-search {
  padding: 8px 10px;
  border-bottom: 0.5px solid var(--border);
}
.search-inp {
  width: 100%; padding: 6px 10px; border: 0.5px solid var(--border);
  border-radius: 6px; background: var(--surface); color: var(--ink);
  font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none;
}
.search-inp::placeholder { color: var(--hint); }
.search-inp:focus { border-color: var(--accent-dim); }

.file-list { flex: 1; overflow-y: auto; padding: 6px; }
.file-list::-webkit-scrollbar { width: 3px; }
.file-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.dir-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em; color: var(--hint);
  text-transform: uppercase; padding: 8px 8px 4px; user-select: none;
}

.file-item {
  padding: 7px 9px; border-radius: 6px; cursor: pointer; margin-bottom: 1px;
  border: 0.5px solid transparent; transition: background 0.1s;
  display: flex; align-items: center; gap: 6px;
}
.file-item:hover { background: var(--surface); }
.file-item.active { background: var(--surface); border-color: var(--border-md); }
.file-item.active .file-name { color: var(--accent); }

.file-icon { font-size: 11px; color: var(--hint); flex-shrink: 0; min-width: 14px; text-align: center; }
.file-name { font-size: 12px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.file-ext  { font-size: 10px; color: var(--hint); flex-shrink: 0; }

.file-sidebar-footer { padding: 10px 10px; border-top: 0.5px solid var(--border); }
.new-file-btn {
  width: 100%; padding: 7px; border: 0.5px solid var(--border-md); border-radius: 6px;
  background: var(--surface); cursor: pointer; color: var(--ink); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.new-file-btn:hover { background: var(--accent-light); border-color: var(--accent-dim); color: var(--accent); }
.new-file-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Editor ── */
.editor-pane {
  flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--surface);
}

.editor-toolbar {
  height: 42px; padding: 0 24px; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.et-filename { font-size: 13px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.et-saved { font-size: 11px; color: var(--accent-dim); opacity: 0; transition: opacity 0.4s; }
.et-saved.show { opacity: 1; }
.et-divider { width: 0.5px; height: 14px; background: var(--border-md); flex-shrink: 0; }

.et-btn {
  height: 26px; padding: 0 10px; border: 0.5px solid var(--border-md); border-radius: 5px;
  background: transparent; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 4px;
  transition: background 0.12s, color 0.12s, border-color 0.12s; white-space: nowrap;
}
.et-btn:hover { background: var(--raised); color: var(--ink); }
.et-btn.danger:hover { background: #fdf0f0; color: var(--danger); border-color: #e8b4b4; }
.et-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.title-area {
  padding: 28px 48px 0;
  flex-shrink: 0;
}
.doc-meta { font-size: 11px; letter-spacing: 0.07em; color: var(--hint); text-transform: uppercase; margin-bottom: 10px; }
.title-input {
  width: 100%; border: none; outline: none; background: transparent;
  font-family: 'Instrument Serif', serif; font-size: 34px; font-style: italic;
  color: var(--ink); letter-spacing: -0.5px; line-height: 1.2; resize: none;
  user-select: text;
}
.title-input::placeholder { color: var(--hint); }

.content-area {
  flex: 1; padding: 16px 48px 32px; overflow-y: auto;
}
.content-area::-webkit-scrollbar { width: 4px; }
.content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.content-input {
  width: 100%; min-height: 100%; border: none; outline: none; background: transparent;
  resize: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300;
  line-height: 1.85; color: var(--ink); user-select: text;
}
.content-input::placeholder { color: var(--hint); }

.status-bar {
  height: 30px; padding: 0 48px; border-top: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
.sb-item { font-size: 11px; color: var(--hint); }

/* ── Empty state ── */
.empty-pane {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; color: var(--hint);
}
.empty-glyph { font-family: 'Instrument Serif', serif; font-size: 56px; font-style: italic; opacity: 0.18; color: var(--ink); line-height: 1; }
.empty-text { font-size: 13px; }

/* ── Modals ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.25); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 0.5px solid var(--border-md);
  border-radius: 10px; padding: 24px; min-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
.modal-input {
  width: 100%; padding: 8px 12px; border: 0.5px solid var(--border-md);
  border-radius: 6px; outline: none; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--ink); background: var(--raised);
  margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--accent-dim); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 7px 16px; border-radius: 6px; border: 0.5px solid var(--border-md);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; background: var(--raised); color: var(--ink);
  transition: background 0.12s;
}
.modal-btn:hover { background: var(--border); }
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn.primary:hover { background: #7a5e38; }
.modal-btn.danger-btn { color: var(--danger); border-color: #e8b4b4; }
.modal-btn.danger-btn:hover { background: #fdf0f0; }
.modal-error { font-size: 12px; color: var(--danger); margin-bottom: 10px; display: none; }

/* No folder selected state */
.no-folder {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--hint);
}
.no-folder-text { font-size: 12px; }
</style>
</head>
<body>

<!-- Title bar -->
<div class="titlebar">
  <div class="titlebar-btns">
    <button class="tb-btn tb-close"  onclick="window.nota.windowClose()" title="ปิด">✕</button>
    <button class="tb-btn tb-min"    onclick="window.nota.windowMin()"   title="ย่อ">−</button>
    <button class="tb-btn tb-max"    onclick="window.nota.windowMax()"   title="ขยาย">⤢</button>
  </div>
  <div class="titlebar-title">Nota</div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Workspace (folder) sidebar -->
  <div class="folder-sidebar">
    <div class="folder-sidebar-header">
      <span class="fs-label">Workspaces</span>
    </div>
    <div class="folder-list" id="folderList"></div>
    <div class="folder-sidebar-footer">
      <button class="add-folder-btn" onclick="addFolder()">+ เพิ่ม Folder</button>
    </div>
  </div>

  <!-- File list sidebar -->
  <div class="file-sidebar">
    <div class="file-sidebar-header">
      <span class="fsh-title" id="fshTitle">—</span>
      <button class="icon-btn" title="รีเฟรช" onclick="refreshFiles()">↻</button>
    </div>
    <div class="file-search">
      <input class="search-inp" id="searchInp" type="text" placeholder="ค้นหาไฟล์..." oninput="filterFiles()">
    </div>
    <div class="file-list" id="fileList">
      <div class="no-folder">
        <div style="font-size:28px;opacity:0.25;">📁</div>
        <div class="no-folder-text">เพิ่ม folder เพื่อเริ่มต้น</div>
      </div>
    </div>
    <div class="file-sidebar-footer">
      <button class="new-file-btn" id="newFileBtn" onclick="openNewFileModal()" disabled>+ ไฟล์ใหม่</button>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-pane" id="editorPane">
    <div class="empty-pane" id="emptyPane">
      <div class="empty-glyph">✦</div>
      <div class="empty-text">เลือกไฟล์เพื่อเริ่มแก้ไข</div>
    </div>
    <div id="editorContent" style="display:none;flex-direction:column;height:100%;">
      <div class="editor-toolbar">
        <span class="et-filename" id="etFilename"></span>
        <span class="et-saved" id="etSaved">บันทึกแล้ว ✓</span>
        <div class="et-divider"></div>
        <button class="et-btn" onclick="openRenameModal()">✏ เปลี่ยนชื่อ</button>
        <button class="et-btn danger" onclick="openDeleteModal()">🗑 ลบ</button>
      </div>
      <div class="title-area">
        <div class="doc-meta" id="docMeta"></div>
        <textarea class="title-input" id="titleInput" rows="1" placeholder="หัวข้อ..." oninput="autoResizeTitle(this); onEdit()"></textarea>
      </div>
      <div class="content-area">
        <textarea class="content-input" id="contentInput" placeholder="เริ่มเขียน..." oninput="onEdit()"></textarea>
      </div>
      <div class="status-bar">
        <span class="sb-item" id="sbWords">0 คำ</span>
        <span class="sb-item" style="opacity:0.3">·</span>
        <span class="sb-item" id="sbChars">0 ตัวอักษร</span>
        <span class="sb-item" style="opacity:0.3">·</span>
        <span class="sb-item" id="sbPath" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </div>
    </div>
  </div>

</div>

<!-- Modal: new file -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <div class="modal-title">สร้างไฟล์ใหม่</div>
    <input class="modal-input" id="newFileName" type="text" placeholder="ชื่อไฟล์ เช่น meeting-notes.md" onkeydown="if(e.key==='Enter')confirmNewFile(event)">
    <div class="modal-error" id="newFileError"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modalNew')">ยกเลิก</button>
      <button class="modal-btn primary" onclick="confirmNewFile()">สร้าง</button>
    </div>
  </div>
</div>

<!-- Modal: rename -->
<div class="modal-overlay" id="modalRename">
  <div class="modal">
    <div class="modal-title">เปลี่ยนชื่อไฟล์</div>
    <input class="modal-input" id="renameInput" type="text" onkeydown="if(event.key==='Enter')confirmRename()">
    <div class="modal-error" id="renameError"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modalRename')">ยกเลิก</button>
      <button class="modal-btn primary" onclick="confirmRename()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Modal: delete -->
<div class="modal-overlay" id="modalDelete">
  <div class="modal">
    <div class="modal-title">ลบไฟล์นี้?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px;" id="deleteDesc"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modalDelete')">ยกเลิก</button>
      <button class="modal-btn danger-btn" onclick="confirmDelete()">ลบถาวร</button>
    </div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────
const state = {
  workspaces: [],        // [{ folderPath, name, files[] }]
  activeWorkspace: null, // folderPath
  activeFile: null,      // { path, name, ext }
  isDirty: false,
}

let saveTimer = null
let savedFadeTimer = null

// ── Init ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderFolderList()
})

// ── Workspaces ──────────────────────────────────────────
async function addFolder() {
  const result = await window.nota.openFolder()
  if (!result) return
  // avoid duplicates
  if (state.workspaces.find(w => w.folderPath === result.folderPath)) {
    selectWorkspace(result.folderPath)
    return
  }
  state.workspaces.push(result)
  selectWorkspace(result.folderPath)
  renderFolderList()
}

function selectWorkspace(folderPath) {
  state.activeWorkspace = folderPath
  state.activeFile = null
  document.getElementById('searchInp').value = ''
  renderFolderList()
  renderFileList()
  showEmptyPane()
}

function removeWorkspace(folderPath, e) {
  e.stopPropagation()
  state.workspaces = state.workspaces.filter(w => w.folderPath !== folderPath)
  if (state.activeWorkspace === folderPath) {
    state.activeWorkspace = state.workspaces[0]?.folderPath || null
    state.activeFile = null
    showEmptyPane()
  }
  renderFolderList()
  renderFileList()
}

async function refreshFiles() {
  if (!state.activeWorkspace) return
  const ws = state.workspaces.find(w => w.folderPath === state.activeWorkspace)
  if (!ws) return
  ws.files = await window.nota.scanFolder(ws.folderPath)
  renderFileList()
}

// ── Render: workspace list ───────────────────────────────
function renderFolderList() {
  const el = document.getElementById('folderList')
  if (!state.workspaces.length) {
    el.innerHTML = '<div style="padding:12px 8px;font-size:11px;color:var(--hint);text-align:center;">ยังไม่มี workspace</div>'
    return
  }
  el.innerHTML = state.workspaces.map(w => `
    <div class="folder-item ${w.folderPath === state.activeWorkspace ? 'active' : ''}"
         onclick="selectWorkspace('${esc(w.folderPath)}')">
      <span class="fi-icon">📁</span>
      <span class="fi-name" title="${esc(w.folderPath)}">${esc(w.name)}</span>
      <span class="fi-remove" onclick="removeWorkspace('${esc(w.folderPath)}', event)" title="ลบออกจาก workspace">✕</span>
    </div>
  `).join('')
}

// ── Render: file list ───────────────────────────────────
function renderFileList() {
  const newFileBtn = document.getElementById('newFileBtn')
  const fshTitle   = document.getElementById('fshTitle')
  const el         = document.getElementById('fileList')

  if (!state.activeWorkspace) {
    fshTitle.textContent = '—'
    newFileBtn.disabled = true
    el.innerHTML = '<div class="no-folder"><div style="font-size:28px;opacity:0.25;">📁</div><div class="no-folder-text">เพิ่ม folder เพื่อเริ่มต้น</div></div>'
    return
  }

  const ws = state.workspaces.find(w => w.folderPath === state.activeWorkspace)
  if (!ws) return

  fshTitle.textContent = ws.name
  newFileBtn.disabled = false

  const q = document.getElementById('searchInp').value.toLowerCase()
  const files = ws.files || []

  // filter flat + nested
  let html = ''
  let hasAny = false

  for (const item of files) {
    if (item.isDir) {
      const matched = item.children.filter(f => !q || f.name.toLowerCase().includes(q))
      if (!matched.length) continue
      html += `<div class="dir-label">📂 ${esc(item.name)}</div>`
      matched.forEach(f => { html += fileItemHtml(f); hasAny = true })
    } else {
      if (q && !item.name.toLowerCase().includes(q)) continue
      html += fileItemHtml(item)
      hasAny = true
    }
  }

  el.innerHTML = hasAny ? html : '<div style="padding:16px 8px;font-size:12px;color:var(--hint);text-align:center;">ไม่พบไฟล์</div>'
}

function fileItemHtml(f) {
  const isActive = state.activeFile?.path === f.path
  const icon = f.ext === '.md' ? 'M' : 'T'
  return `<div class="file-item ${isActive ? 'active' : ''}" onclick="openFile(${JSON.stringify(f)})">
    <span class="file-icon">${icon}</span>
    <span class="file-name" title="${esc(f.name)}">${esc(f.name.replace(/\.(md|txt)$/i,''))}</span>
    <span class="file-ext">${f.ext}</span>
  </div>`
}

function filterFiles() { renderFileList() }

// ── Open file ────────────────────────────────────────────
async function openFile(fileInfo) {
  if (state.isDirty && state.activeFile) await forceSave()
  state.activeFile = fileInfo
  const raw = await window.nota.readFile(fileInfo.path)
  // Split first line as title if content starts with #
  let title = '', body = raw
  if (raw.startsWith('# ')) {
    const nl = raw.indexOf('\n')
    if (nl > -1) {
      title = raw.slice(2, nl)
      body  = raw.slice(nl + 1).replace(/^\n/, '')
    } else {
      title = raw.slice(2)
      body = ''
    }
  } else {
    title = fileInfo.name.replace(/\.(md|txt)$/i, '')
    body  = raw
  }

  document.getElementById('titleInput').value = title
  document.getElementById('contentInput').value = body
  autoResizeTitle(document.getElementById('titleInput'))

  const d = new Date(fileInfo.mtime)
  document.getElementById('docMeta').textContent =
    fileInfo.ext.toUpperCase().slice(1) + ' · ' +
    d.toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' })
  document.getElementById('etFilename').textContent = fileInfo.name
  document.getElementById('sbPath').textContent = fileInfo.path

  updateStats()
  state.isDirty = false

  document.getElementById('emptyPane').style.display = 'none'
  const ec = document.getElementById('editorContent')
  ec.style.display = 'flex'

  renderFileList()
  document.getElementById('contentInput').focus()
}

function showEmptyPane() {
  document.getElementById('emptyPane').style.display = 'flex'
  document.getElementById('editorContent').style.display = 'none'
}

// ── Edit & Save ──────────────────────────────────────────
function onEdit() {
  state.isDirty = true
  updateStats()
  clearTimeout(saveTimer)
  saveTimer = setTimeout(forceSave, 800)
}

async function forceSave() {
  if (!state.activeFile || !state.isDirty) return
  const title   = document.getElementById('titleInput').value
  const content = document.getElementById('contentInput').value

  let raw
  if (state.activeFile.ext === '.md') {
    raw = title ? `# ${title}\n\n${content}` : content
  } else {
    raw = title ? `${title}\n\n${content}` : content
  }

  await window.nota.writeFile(state.activeFile.path, raw)
  state.isDirty = false
  showSaved()
  refreshFiles()
}

function showSaved() {
  const el = document.getElementById('etSaved')
  el.classList.add('show')
  clearTimeout(savedFadeTimer)
  savedFadeTimer = setTimeout(() => el.classList.remove('show'), 2000)
}

function updateStats() {
  const body = document.getElementById('contentInput').value
  const title = document.getElementById('titleInput').value
  const full = title + ' ' + body
  const words = full.trim() ? full.trim().split(/\s+/).length : 0
  document.getElementById('sbWords').textContent = words + ' คำ'
  document.getElementById('sbChars').textContent = (title.length + body.length) + ' ตัวอักษร'
}

function autoResizeTitle(el) {
  el.style.height = 'auto'
  el.style.height = el.scrollHeight + 'px'
}

// ── New file ─────────────────────────────────────────────
function openNewFileModal() {
  if (!state.activeWorkspace) return
  document.getElementById('newFileName').value = ''
  document.getElementById('newFileError').style.display = 'none'
  openModal('modalNew')
  setTimeout(() => document.getElementById('newFileName').focus(), 50)
}

async function confirmNewFile() {
  let name = document.getElementById('newFileName').value.trim()
  if (!name) return
  if (!/\.(md|txt)$/i.test(name)) name += '.md'

  // find active workspace root
  const ws = state.workspaces.find(w => w.folderPath === state.activeWorkspace)
  if (!ws) return

  const result = await window.nota.createFile(ws.folderPath, name)
  if (result.error) {
    const errEl = document.getElementById('newFileError')
    errEl.textContent = result.error; errEl.style.display = 'block'
    return
  }
  closeModal('modalNew')
  await refreshFiles()
  const ext = name.match(/\.(md|txt)$/i)[0]
  openFile({ path: result.filePath, name, ext, mtime: Date.now() })
}

// ── Rename ────────────────────────────────────────────────
function openRenameModal() {
  if (!state.activeFile) return
  document.getElementById('renameInput').value = state.activeFile.name
  document.getElementById('renameError').style.display = 'none'
  openModal('modalRename')
  setTimeout(() => {
    const inp = document.getElementById('renameInput')
    inp.focus()
    const dotIdx = inp.value.lastIndexOf('.')
    inp.setSelectionRange(0, dotIdx > -1 ? dotIdx : inp.value.length)
  }, 50)
}

async function confirmRename() {
  if (state.isDirty) await forceSave()
  const newName = document.getElementById('renameInput').value.trim()
  if (!newName || newName === state.activeFile.name) { closeModal('modalRename'); return }

  const result = await window.nota.renameFile(state.activeFile.path, newName)
  if (result.error) {
    const errEl = document.getElementById('renameError')
    errEl.textContent = result.error; errEl.style.display = 'block'
    return
  }
  const ext = newName.match(/\.(md|txt)$/i)?.[0] || state.activeFile.ext
  state.activeFile = { ...state.activeFile, path: result.newPath, name: newName, ext }
  document.getElementById('etFilename').textContent = newName
  document.getElementById('sbPath').textContent = result.newPath
  closeModal('modalRename')
  await refreshFiles()
  renderFileList()
}

// ── Delete ────────────────────────────────────────────────
function openDeleteModal() {
  if (!state.activeFile) return
  document.getElementById('deleteDesc').textContent = `"${state.activeFile.name}" จะถูกลบถาวร ไม่สามารถกู้คืนได้`
  openModal('modalDelete')
}

async function confirmDelete() {
  if (!state.activeFile) return
  await window.nota.deleteFile(state.activeFile.path)
  state.activeFile = null
  closeModal('modalDelete')
  showEmptyPane()
  await refreshFiles()
  renderFileList()
}

// ── Modal helpers ─────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open') })
})

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'))
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); forceSave() }
})

// ── Utils ─────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
</script>
</body>
